<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdBuddy Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        
        <!-- Left Column: Tasks Matrix & Ideas -->
        <div class="column left-column">
            
            <!-- Tasks Matrix -->
            <section class="panel tasks-panel">
                <div class="panel-header">
                    <h2>Tasks MATRIX</h2>
                    <button class="icon-btn add-btn" onclick="openModal('tasks')"><i class="fa-solid fa-plus"></i></button>
                </div>
                
                <div class="eisenhower-matrix">
                    <div class="quadrant q-urgent-important">
                        <h3>Important & Urgent</h3>
                        <div class="list-container" id="tasks-urgent-important"></div>
                    </div>
                    <div class="quadrant q-not-urgent-important">
                        <h3>Important & Not Urgent</h3>
                        <div class="list-container" id="tasks-not-urgent-important"></div>
                    </div>
                    <div class="quadrant q-urgent-not-important">
                        <h3>Not Important & Urgent</h3>
                        <div class="list-container" id="tasks-urgent-not-important"></div>
                    </div>
                    <div class="quadrant q-not-urgent-not-important">
                        <h3>Not Important & Not Urgent</h3>
                        <div class="list-container" id="tasks-not-urgent-not-important"></div>
                    </div>
                </div>
            </section>

            <!-- Ideas -->
            <section class="panel ideas-panel">
                <div class="panel-header">
                    <h2>Ideas</h2>
                    <button class="icon-btn add-btn" onclick="openModal('ideas')"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="list-container scrollable-list" id="ideas-list"></div>
            </section>

        </div>

        <!-- Right Column: Shoplist & Notes -->
        <div class="column right-column">
            
            <!-- Shoplist -->
            <section class="panel shoplist-panel">
                <div class="panel-header">
                    <h2>Shop List</h2>
                    <button class="icon-btn add-btn" onclick="openModal('shopitems')"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="list-container scrollable-list" id="shoplist"></div>
            </section>

            <!-- Notes -->
            <section class="panel notes-panel">
                <div class="panel-header">
                    <h2>Notes</h2>
                    <button class="icon-btn add-btn" onclick="openModal('notes')"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="list-container scrollable-list" id="notes-list"></div>
            </section>

        </div>
    </div>

    <!-- Floating Mic Button -->
    <button class="fab-mic" title="Voice Input (Coming Soon)">
        <i class="fa-solid fa-microphone"></i>
    </button>

    <!-- Global Modal -->
    <div id="unified-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">Add Item</h3>
                <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="unified-form" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="entity-type">
                <input type="hidden" id="entity-id">

                <div id="dynamic-fields">
                    <!-- Fields injected here by JS -->
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="modal-submit-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
